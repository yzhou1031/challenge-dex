  Congratulations — you've completed the DEX Challenge!

  Your DEX contract can now:
  - **Initialize a liquidity pool** with `init()` seeding ETH + $BAL reserves
  - **Price trades** using the constant-product formula `x * y = k` with a 0.3% fee
  - **Swap ETH for tokens** and **tokens for ETH** with proper validation
  - **Accept deposits** from liquidity providers who earn trading fees
  - **Process withdrawals** returning proportional ETH + $BAL

  Key concepts you learned:
  - Constant-product AMM formula and why it always has liquidity
  - Integer math tricks (997/1000) to handle fees without decimals
  - The `approve` + `transferFrom` pattern for ERC20 tokens
  - Reserve calculation: `address(this).balance` includes `msg.value`
  - LP tokens representing proportional pool ownership
  - Rounding up with `+ 1` to prevent pool dilution

  **The big takeaway:** A few simple formulas can create a fully functional decentralized exchange. The `x * y = k` curve automatically adjusts prices based on supply and demand — no order book needed!

